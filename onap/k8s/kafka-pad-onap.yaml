# Single-node Kafka (KRaft) for PAD-ONAP — namespace `pad-onap`
# =============================================================
# Mirrors the broker spec from testbed/docker-compose.yml so that the
# in-cluster `pad-onap-pipeline` Pod and an external Mininet VM use the
# same broker with two listeners:
#
#   INTERNAL :9092 — advertised as kafka.pad-onap.svc.cluster.local:9092
#                    used by pad-onap-pipeline (Pod-to-Pod, in-cluster DNS)
#
#   EXTERNAL :9094 — advertised as ${PAD_NODE_PUBLIC_IP}:30992
#                    used by the remote Mininet VM via NodePort 30992
#
# Apply:
#   # 1. Replace <NODE_PUBLIC_IP> with the IP the Mininet VM reaches:
#   sed -i 's|<NODE_PUBLIC_IP>|10.50.0.1|g' onap/k8s/kafka-pad-onap.yaml
#   # 2. Apply manifests:
#   kubectl apply -f onap/k8s/kafka-pad-onap.yaml
#   # 3. Wait for Kafka to be ready:
#   kubectl -n pad-onap rollout status statefulset/kafka --timeout=180s
#   # 4. Smoke-test from inside the cluster:
#   kubectl -n pad-onap run kafka-cli --rm -it --restart=Never \
#     --image=apache/kafka:3.7.0 -- \
#     /opt/kafka/bin/kafka-topics.sh \
#     --bootstrap-server kafka.pad-onap.svc.cluster.local:9092 --list
#   # 5. Smoke-test from outside (replace <NODE_IP>):
#   nc -zv <NODE_IP> 30992
#
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: pad-onap
  labels:
    app: kafka
spec:
  type: ClusterIP
  selector:
    app: kafka
  ports:
    - name: internal
      port: 9092
      targetPort: 9092
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-external
  namespace: pad-onap
  labels:
    app: kafka
spec:
  type: NodePort
  selector:
    app: kafka
  ports:
    - name: external
      port: 9094
      targetPort: 9094
      nodePort: 30992
      protocol: TCP

---
# Headless service for StatefulSet pod DNS (kafka-0.kafka-headless.pad-onap.svc)
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: pad-onap
  labels:
    app: kafka
spec:
  clusterIP: None
  selector:
    app: kafka
  ports:
    - name: internal
      port: 9092
    - name: controller
      port: 9093
    - name: external
      port: 9094

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: pad-onap
  labels:
    app: kafka
spec:
  serviceName: kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: internal
              containerPort: 9092
            - name: controller
              containerPort: 9093
            - name: external
              containerPort: 9094
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094"
            # IMPORTANT — EXTERNAL advertised host MUST be reachable from the
            # Mininet VM. Replace <NODE_PUBLIC_IP> with the value `kubectl get
            # nodes -o wide` shows under EXTERNAL-IP (or the VPN gateway IP if
            # you tunnel from the Mininet VM).
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "INTERNAL://kafka.pad-onap.svc.cluster.local:9092,EXTERNAL://<NODE_PUBLIC_IP>:30992"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "INTERNAL"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka-0.kafka-headless.pad-onap.svc.cluster.local:9093"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "2"
            - name: KAFKA_LOG_RETENTION_BYTES
              value: "536870912"
            - name: KAFKA_LOG_SEGMENT_BYTES
              value: "10485760"
            - name: KAFKA_CLUSTER_ID
              value: "pad-onap-kafka-v1"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
