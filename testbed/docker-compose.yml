version: '3.8'

# PAD-ONAP Infrastructure + M4 VNF Stack
# =========================================
# Infrastructure services: Kafka, gNMI, monitoring (Prometheus/Grafana).
# M4 VNF containers     : scrubber, ratelimiter, analyzer, blackhole.
# M2/M3 pipeline        : chạy NATIVE trên host (CUDA + dễ debug).
#
# Cấu hình: sửa file .env trước khi chạy.
# Port mặc định (tránh xung đột ONAP):
#   Kafka external        : ${PAD_KAFKA_PORT:-9092}
#   Prometheus            : ${PAD_PROMETHEUS_PORT:-9190}   (ONAP dùng 9090)
#   Grafana               : ${PAD_GRAFANA_PORT:-3001}       (ONAP dùng 3000)
#   VNF Scrubber          : ${PAD_VNF_SCRUBBER_PORT:-8001}
#   VNF Rate-limiter      : ${PAD_VNF_RATELIMITER_PORT:-8002}
#   VNF Analyzer          : ${PAD_VNF_ANALYZER_PORT:-8003}
#   VNF Blackhole         : ${PAD_VNF_BLACKHOLE_PORT:-8004}
#   Latency Prometheus    : ${PAD_LATENCY_PORT:-9292}
#
# Quick start:
#   cp .env.example .env                     # chỉnh PAD_HOST nếu cần
#   docker compose build                     # build VNF images
#   docker compose up -d                     # khởi động infrastructure + VNFs
#   python -m pipeline.s4_orchestration.orchestrator --source http
#
# Plug-and-play ONAP:
#   PAD_ONAP_STUB=false  → dùng ONAP SO + Policy Framework thật
#   PAD_ONAP_STUB=true   → Docker stub (default, cho testbed)
#
# Kafka broker addresses:
#   Từ Docker containers : kafka:${PAD_KAFKA_INTERNAL_PORT:-29092}
#   Từ host native       : ${PAD_HOST:-localhost}:${PAD_KAFKA_PORT:-9092}
#
# Logs:   docker compose logs -f pad-vnf-scrubber
# Stop:   docker compose down

services:

  # ── Kafka KRaft (no Zookeeper) ─────────────────────────────────────────────
  # Single-node KRaft (broker + controller cùng pod).
  # Lỗi cũ:  "Cannot resolve hostname kafka" khi broker dial controller quorum
  #          → race condition giữa Docker DNS registration và Kafka startup.
  # Fix tổng hợp:
  #   1. hostname: kafka  + network alias        → tự resolve trong container
  #   2. CONTROLLER quorum dùng localhost:9093    → bỏ phụ thuộc DNS hoàn toàn
  #   3. extra_hosts kafka → 127.0.0.1             → belt-and-suspenders
  #   4. start_period 60s                         → đủ thời gian DNS register
  #   5. healthcheck dùng kafka:9092 (advertised) → catch DNS issue sớm
  kafka:
    image: apache/kafka:3.7.0
    container_name: pad-kafka
    hostname: kafka                    # ★ FIX 1: tự khai báo hostname
    extra_hosts:                       # ★ FIX 3: hardcode kafka → loopback
      - "kafka:127.0.0.1"
    ports:
      - "${PAD_KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # Dual listener: INTERNAL for containers, EXTERNAL for host
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://${PAD_HOST:-localhost}:${PAD_KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # ★ FIX 2: single-node KRaft → voter trỏ vào chính nó qua loopback,
      # không qua Docker DNS. Tránh chết khi container vừa khởi động.
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 2
      KAFKA_LOG_RETENTION_BYTES: 536870912    # 512 MB max per topic partition
      KAFKA_LOG_SEGMENT_BYTES: 10485760       # 10 MB segments
      KAFKA_CLUSTER_ID: "pad-onap-kafka-v1"
    volumes:
      - kafka_data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 1g
    restart: always
    networks:
      default:
        aliases:
          - kafka                      # ★ FIX 1 (tt): alias cho intra-network
    healthcheck:
      # Dùng kafka:9092 thay localhost:9092 để catch DNS issue sớm,
      # đồng thời xác nhận broker đã bind đúng advertised listener.
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh",
             "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 8s
      retries: 8
      start_period: 60s                # ★ FIX 4: KRaft cần ~30-40s để format log
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    labels:
      - "pad-onap.component=kafka"

  # ── gNMI Simulator ─────────────────────────────────────────────────────────
  gnmi-simulator:
    build:
      context: ./gnmi_simulator
      dockerfile: Dockerfile
    container_name: pad-gnmi-sim
    ports:
      - "${PAD_GNMI_PORT:-8080}:8080"
    deploy:
      resources:
        limits:
          memory: 256m
    restart: always
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "pad-onap.component=gnmi-simulator"

  # ── NetFlow Collector (synthetic mode) ─────────────────────────────────────
  netflow-collector:
    image: python:3.11-slim
    container_name: pad-netflow-collector
    volumes:
      - ./netflow_collector:/app
      - pip_cache:/root/.cache/pip
    working_dir: /app
    # Pre-install deps then start; pip cache volume avoids re-download on restart
    command: sh -c "pip install flask requests -q --no-cache-dir && python3 -u collector.py --mode synthetic --gnmi http://gnmi-simulator:8080 --api-port 7070 --interval 1.0"
    ports:
      - "${PAD_COLLECTOR_PORT:-7070}:7070"
      - "${PAD_NETFLOW_UDP_PORT:-6343}:6343/udp"
    depends_on:
      gnmi-simulator:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
    restart: always
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:7070/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "pad-onap.component=netflow-collector"

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: pad-prometheus
    ports:
      - "${PAD_PROMETHEUS_PORT:-9190}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=2GB'
      - '--web.enable-lifecycle'
    deploy:
      resources:
        limits:
          memory: 512m
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "pad-onap.component=prometheus"

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: pad-grafana
    ports:
      - "${PAD_GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-padOnap2026}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/pad_overview.json
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256m
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "pad-onap.component=grafana"

  # ── Metrics Exporter (gNMI-sim → Prometheus) ────────────────────────────────
  metrics-exporter:
    image: python:3.11-slim
    container_name: pad-metrics-exporter
    volumes:
      - ../pipeline:/pipeline
      - pip_cache:/root/.cache/pip
    command: >
      sh -c "pip install prometheus-client requests -q --no-cache-dir &&
             python3 /pipeline/s3_ai/metrics_exporter.py
               --gnmi http://gnmi-simulator:8080
               --port 9091"
    ports:
      - "${PAD_METRICS_EXPORTER_PORT:-9191}:9091"
    depends_on:
      gnmi-simulator:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    labels:
      - "pad-onap.component=metrics-exporter"

  # ── M4 VNF: Scrubber ────────────────────────────────────────────────────────
  # Stateful SYN proxy + rate limiting (8 vCPU, 16 GB)
  # Activated by Orchestrator on Tier 3/4 events via POST /activate
  pad-vnf-scrubber:
    build:
      context: ../docker/vnf-scrubber
      dockerfile: Dockerfile
    container_name: pad-vnf-scrubber
    image: pad-vnf-scrubber:latest
    ports:
      - "${PAD_VNF_SCRUBBER_PORT:-8001}:8001"
    environment:
      - PAD_VNF_MODE=standby
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    labels:
      - "pad-onap.component=vnf-scrubber"
      - "pad-onap.tier=3,4"

  # ── M4 VNF: Rate-limiter ─────────────────────────────────────────────────────
  # Token-bucket per-flow rate limiter (2 vCPU, 2 GB)
  # Activated on Tier 2 (PREEMPT) — pre-positioned, lower overhead
  pad-vnf-ratelimiter:
    build:
      context: ../docker/vnf-ratelimiter
      dockerfile: Dockerfile
    container_name: pad-vnf-ratelimiter
    image: pad-vnf-ratelimiter:latest
    ports:
      - "${PAD_VNF_RATELIMITER_PORT:-8002}:8002"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "pad-onap.component=vnf-ratelimiter"
      - "pad-onap.tier=2"

  # ── M4 VNF: Analyzer ─────────────────────────────────────────────────────────
  # Packet capture + feature re-extraction → feeds M1 telemetry (2 vCPU, 4 GB)
  pad-vnf-analyzer:
    build:
      context: ../docker/vnf-analyzer
      dockerfile: Dockerfile
    container_name: pad-vnf-analyzer
    image: pad-vnf-analyzer:latest
    ports:
      - "${PAD_VNF_ANALYZER_PORT:-8003}:8003"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "pad-onap.component=vnf-analyzer"
      - "pad-onap.tier=2,3,4"

  # ── M4 VNF: Blackhole ────────────────────────────────────────────────────────
  # iptables-based null-routing (1 vCPU, 1 GB) — Tier 4 ISOLATE only
  pad-vnf-blackhole:
    build:
      context: ../docker/vnf-blackhole
      dockerfile: Dockerfile
    container_name: pad-vnf-blackhole
    image: pad-vnf-blackhole:latest
    ports:
      - "${PAD_VNF_BLACKHOLE_PORT:-8004}:8004"
    # NET_ADMIN needed for real iptables; omit if running in stub mode
    cap_add:
      - NET_ADMIN
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "pad-onap.component=vnf-blackhole"
      - "pad-onap.tier=4"

# ── Note: M2/M3 pipeline (kafka_producer, flink_processor, orchestrator) ─────
# Chạy native trên host (không phải Docker) để:
#   1. Tận dụng CUDA GPU trực tiếp (InferenceEngine)
#   2. Không cần pip install mỗi lần restart
#   3. Dễ debug và monitor latency logs
#
# Xem deploy/start.sh để khởi động toàn bộ pipeline.
# Orchestrator command:
#   python -m pipeline.s4_orchestration.orchestrator \
#       --source http --collector http://localhost:7070 \
#       --model-dir ./pad_onap_v3/models \
#       --latency-port 9292

volumes:
  kafka_data:
  prometheus_data:
  grafana_data:
  pip_cache:        # shared pip cache → containers restart nhanh hơn

networks:
  default:
    name: pad-onap-testbed
