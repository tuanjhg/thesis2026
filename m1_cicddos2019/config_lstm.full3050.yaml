data_dir: ../Dataset
output_dir: ./artifacts
model_name: m1_lstm_full3050
model_type: lstm

timestamp_column: Timestamp
label_column: Label
benign_keywords:
  - benign
  - normal

poll_interval_seconds: 3
window_size: 30
forecast_horizon_seconds: 30

feature_columns:
  - pkt_rate
  - byte_rate
  - syn_rate
  - src_ip_entropy
  - dst_ip_entropy
  - pkt_len_mean
  - pkt_len_std
  - flow_rate
  - iat_mean
  - iat_std
  - tcp_flag_ratio
  - retry_rate
  - icmp_rate
  - udp_rate
  - http_rate
drop_columns:
  - Flow ID
  - Source IP
  - Source Port
  - Destination IP
  - Destination Port
  - Protocol

train_ratio: 0.7
val_ratio: 0.15
random_seed: 42

batch_size: 64
learning_rate: 0.001
weight_decay: 0.0001
max_epochs: 50
early_stopping_patience: 8

tcn_channels: [64, 64, 32]
tcn_kernel_size: 3
tcn_dropout: 0.2

lstm_hidden_size: 128
lstm_num_layers: 2
lstm_dropout: 0.2
lstm_bidirectional: false

focal_alpha: 0.25
focal_gamma: 2.0
threshold_search_fpr_max: 0.05

num_workers: 2
device: auto

use_memmap_sequences: true
memmap_min_samples: 50000
scaler_batch_windows: 4096
csv_chunk_size: 200000
